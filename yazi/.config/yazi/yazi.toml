"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 1, 4, 3 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1600
max_height      = 1600
cache_dir       = ""
image_delay     = 20
image_filter    = "lanczos3"
image_quality   = 80
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
edit = [
	{ run = '${EDITOR:-nvim} "$@"', block = true, desc = "Edit in $EDITOR", for = "unix" },
]
open = [
	{ run = 'xdg-open "$1"', orphan = true, desc = "Open", for = "linux" },
]
reveal = [
	{ run = 'xdg-open "$(dirname "$1")"', orphan = true, desc = "Reveal", for = "linux" },
]
extract = [
	{ run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix" },
]
play = [
	{ run = 'mpv --force-window "$@"', orphan = true, desc = "Play in mpv", for = "unix" },
]
nvim = [
	{ run = 'ghostty -e ${EDITOR:-nvim} "$@"', orphan = true, desc = "Open in Neovim", for = "linux" },
]

[open]
prepend_rules = [
	{ name = "*/", use = [ "nvim", "reveal", "open" ] },
	{ mime = "text/*", use = [ "nvim", "edit", "reveal" ] },
	{ mime = "application/{json,ndjson}", use = [ "nvim", "edit", "reveal" ] },
	{ mime = "*/javascript", use = [ "nvim", "edit", "reveal" ] },
	{ mime = "inode/empty", use = [ "nvim", "edit", "reveal" ] },
	{ mime = "image/*", use = [ "open", "reveal" ] },
	{ mime = "application/pdf", use = [ "open", "reveal" ] },
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
	{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", use = [ "extract", "reveal" ] },
	{ name = "*.{md,txt,log,conf,toml,yaml,yml,json,jsonc,ini,cfg,env,sh,bash,zsh,fish,py,js,ts,tsx,jsx,lua,rs,go,c,cpp,h,hpp,java,kt,css,scss,html,sql}", use = [ "nvim", "edit", "reveal" ] },
]

[tasks]
micro_workers    = 10
macro_workers    = 20
bizarre_retry    = 3
image_alloc      = 536870912
image_bound      = [ 5000, 5000 ]
suppress_preload = false

[plugin]
prepend_fetchers = [
	{ id = "mime", name = "*", run = "mime", prio = "high" },
]
spotters = [
	{ name = "*/", run = "folder" },
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	{ mime = "video/*", run = "video" },
	{ name = "*", run = "file" },
]
preloaders = [
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	{ mime = "video/*", run = "video" },
	{ mime = "application/pdf", run = "pdf" },
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
]
previewers = [
	{ name = "*/", run = "folder" },
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	{ mime = "application/{json,ndjson}", run = "json" },
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	{ mime = "video/*", run = "video" },
	{ mime = "application/pdf", run = "pdf" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
	{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
	{ name = "*.{AppImage,appimage}", run = "archive" },
	{ mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
	{ mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
	{ name = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
	{ mime = "inode/empty", run = "empty" },
	{ name = "*", run = "file" },
]
